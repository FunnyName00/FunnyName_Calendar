<!DOCTYPE html>
<html>
<head>
    <title>Liste :3</title>
</head>

<body>
    <h2>Add new items</h2>
    <form action="/add" method="POST">
        <select name="type" id="type-selector" onchange="toggleFields()">
            <option value="general">General Note</option>
            <option value="activity">Calendar Activity</option>
            <option value="shopping">Shopping Item</option>
        </select>

        <input type="text" name="user" placeholder="User" required>
        <input type="text" name="content" placeholder="Content" required>

        <div id="activity-fields" style="display:none;">
            <input type="date" name="date">
            <input type="text" name="place" placeholder="Location">
        </div>

        <button type="submit">Save</button>
    </form>

    <script>
        function toggleFields() {
            var type = document.getElementById("type-selector").value;
            document.getElementById("activity-fields").style.display = (type === "activity") ? "block" : "none";
        }
    </script>

    <hr>

    <h2>The List</h2>
    <ul>
        {% for item in items %}
            <li>
                <strong>[{{ item.item_type }}]</strong> {{ item.content }}
                {% if item.item_type == 'activity' %}
                    <small>at {{ item.place }} on {{ item.date }}</small>
                {% endif %}
                <a href="/delete/{{ item.id }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
